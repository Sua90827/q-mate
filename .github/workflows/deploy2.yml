name: Deploy to q-mate (front)

on:
  push:
    branches: ['dev']
  workflow_dispatch:
    inputs:
      message:
        description: 'Mirror commit message (optional)'
        required: false
        default: 'chore: mirror output'

jobs:
  build:
    runs-on: ubuntu-latest
    container: pandoc/latex

    # 공통 ENV로 커밋 메시지 폴백 구성
    env:
      COMMIT_MSG: "${{ inputs.message || github.event.head_commit.message || 'chore: mirror output' }}"

    steps:
      - uses: actions/checkout@v2

      - name: Install mustache (to update the date)
        run: apk add ruby && gem install mustache

      - name: creates output
        run: sh ./front/build.sh

      - name: Pushes to another repository (yuhyeon9808/q-mate)
        id: push_directory1
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.AUTO_ACTIONS }}
        with:
          source-directory: 'output'
          destination-github-username: yuhyeon9808
          destination-repository-name: q-mate
          user-name: 'qmate-bot'
          user-email: ${{ secrets.EMAIL }}
          commit-message: ${{ env.COMMIT_MSG }}
          target-branch: main

      - name: Pushes to another repository (leejicircle/q-mate)
        id: push_directory2
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.AUTO_ACTIONS2 }}
        with:
          source-directory: 'output'
          destination-github-username: leejicircle
          destination-repository-name: q-mate
          user-name: 'qmate-bot'
          user-email: ${{ secrets.EMAIL2 }}
          commit-message: ${{ env.COMMIT_MSG }}
          target-branch: main

      - name: Test get variable exported by push-to-another-repository
        run: echo "$DESTINATION_CLONED_DIRECTORY"
