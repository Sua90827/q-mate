name: Deploy Qmate to EC2

on:
  push:
    branches: [ "dev" ]
  workflow_dispatch:
    inputs:
      mode:
        description: "choose: build-only or deploy"
        required: true
        default: "build-only"
        type: choice
        options:
          - build-only
          - deploy

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'

      - name: Grant execute permission for gradlew (root)
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean :back:bootJar

      - name: Upload JAR to EC2
        if: >
          (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'deploy')
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "back/build/libs/*.jar"
          target: "/tmp"
          strip_components: 3   # back/build/libs/ 잘라내고 /tmp 바로 아래에 파일만

      - name: Deploy & Restart via systemd (inject secrets as drop-in)
        if: >
          (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'deploy')
        uses: appleboy/ssh-action@v1.0.3
        env:
          SPRING_PROFILES_ACTIVE: "prod"
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_EMAIL_VERIFICATION_JWT_SECRET: ${{ secrets.APP_EMAIL_VERIFICATION_JWT_SECRET }}
          OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          OAUTH_NAVER_CLIENT_ID: ${{ secrets.OAUTH_NAVER_CLIENT_ID }}
          OAUTH_NAVER_CLIENT_SECRET: ${{ secrets.OAUTH_NAVER_CLIENT_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: SPRING_PROFILES_ACTIVE,DB_URL,DB_USERNAME,DB_PASSWORD,REDIS_HOST,REDIS_PORT,MAIL_HOST,MAIL_PORT,MAIL_USERNAME,MAIL_PASSWORD,JWT_SECRET,APP_EMAIL_VERIFICATION_JWT_SECRET,OAUTH_GOOGLE_CLIENT_ID,OAUTH_GOOGLE_CLIENT_SECRET,OAUTH_NAVER_CLIENT_ID,OAUTH_NAVER_CLIENT_SECRET
          script: |
            set -e

            # 디버그: 실제 업로드된 JAR 위치 확인
            echo "=== /tmp listing (depth 3) ==="
            find /tmp -maxdepth 3 -type f -name "*.jar" -print || true
            ls -al /tmp || true
            
            # 0) 통일된 배치 경로 사용
            sudo mkdir -p /opt/qmate
            
            # strip_components가 잘 먹었으면 /tmp/*.jar 에 있어야 함
            if ls /tmp/*.jar >/dev/null 2>&1; then
            JAR=$(ls -1t /tmp/*.jar | grep -v -- '-plain\.jar$' | head -n1)
            else
            # 혹시 평탄화가 실패했거나 다른 폴더로 들어갔을 경우 대비(재귀 검색)
            mapfile -t CANDS < <(find /tmp -type f -name "*.jar" ! -name "*-plain.jar" 2>/dev/null)
            if [ ${#CANDS[@]} -eq 0 ]; then
            echo "[ERROR] /tmp 아래에서 JAR를 찾지 못했습니다."
            exit 1
            fi
            JAR=$(ls -1t "${CANDS[@]}" | head -n1)
            fi
            
            echo "Picked JAR: $JAR"
            sudo mv "$JAR" /opt/qmate/qmate.jar
            sudo chown ec2-user:ec2-user /opt/qmate/qmate.jar
            
            # 1) 현재 깨진 파일들을 눈으로 확인 (문제 재발 시 진단용)
            echo "----- BEGIN CURRENT UNIT -----"
            sudo sed -n '1,120p' /etc/systemd/system/qmate.service 2>/dev/null || true
            echo "----- END CURRENT UNIT -----"
            echo "----- BEGIN CURRENT DROPIN -----"
            echo "----- END CURRENT DROPIN -----"
            
            # 2) 유닛: 로컬 셸에서 '비확장' heredoc으로 임시파일 생성 후 install
            cat <<'UNIT' >/tmp/qmate.service
            [Unit]
            Description=QMate Spring Boot Service
            After=network.target
            
            [Service]
            User=ec2-user
            WorkingDirectory=/opt/qmate
            ExecStart=/usr/bin/java -jar /opt/qmate/qmate.jar
            Restart=always
            RestartSec=5
            SuccessExitStatus=143
            
            [Install]
            WantedBy=multi-user.target
            UNIT
            
            sudo install -o root -g root -m 644 /tmp/qmate.service /etc/systemd/system/qmate.service
            rm -f /tmp/qmate.service
            
            # 3) 드롭인: 값 확장 필요 → 임시파일에 먼저 만들고 install
            cat > /tmp/qmate-env.conf <<EOF
            [Service]
            Environment="SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}"
            Environment="DB_URL=${DB_URL}"
            Environment="DB_USERNAME=${DB_USERNAME}"
            Environment="DB_PASSWORD=${DB_PASSWORD}"
            Environment="REDIS_HOST=${REDIS_HOST}"
            Environment="REDIS_PORT=${REDIS_PORT}"
            Environment="MAIL_HOST=${MAIL_HOST}"
            Environment="MAIL_PORT=${MAIL_PORT}"
            Environment="MAIL_USERNAME=${MAIL_USERNAME}"
            Environment="MAIL_PASSWORD=${MAIL_PASSWORD}"
            Environment="JWT_SECRET=${JWT_SECRET}"
            Environment="APP_EMAIL_VERIFICATION_JWT_SECRET=${APP_EMAIL_VERIFICATION_JWT_SECRET}"
            Environment="OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID}"
            Environment="OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET}"
            Environment="OAUTH_NAVER_CLIENT_ID=${OAUTH_NAVER_CLIENT_ID}"
            Environment="OAUTH_NAVER_CLIENT_SECRET=${OAUTH_NAVER_CLIENT_SECRET}"
            EOF
            
            sudo mkdir -p /etc/systemd/system/qmate.service.d
            sudo install -o root -g root -m 600 /tmp/qmate-env.conf /etc/systemd/system/qmate.service.d/env.conf
            rm -f /tmp/qmate-env.conf
            
            # 4) 유닛/드롭인 최종 확인(맨 앞 10줄에 [Unit]/[Service]로 시작하는지 확인)
            echo "----- VERIFY NEW UNIT -----"
            sudo sed -n '1,40p' /etc/systemd/system/qmate.service
            echo "----- VERIFY NEW DROPIN -----"
            # sudo sed -n '1,40p' /etc/systemd/system/qmate.service.d/env.conf
            
            # 5) 리로드 & 재시작
            sudo systemctl daemon-reload
            sudo systemctl enable qmate
            sudo systemctl restart qmate
            
            # 6) 환경변수 실제 반영 확인
            sudo systemctl show qmate -p Environment | sed 's/=\([^ ]*\)/=***/g'
            
            
            # 7) 헬스체크(조금 더 여유 있게)
            for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/actuator/health || true)
            if [ "$code" = "200" ]; then
            echo "Health OK"
            exit 0
            fi
            sleep 2
            done
            echo "Health check failed"
            sudo systemctl status qmate --no-pager
            journalctl -u qmate -n 200 --no-pager
            exit 1
