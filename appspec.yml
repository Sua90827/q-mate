version: 0.0
os: linux
files:
  - source: app.jar
    destination: /opt/qmate/release
permissions:
  - object: /opt/qmate
    owner: ec2-user
    group: ec2-user
    pattern: "**"
hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 180
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 180
      runas: root
  ApplicationStart:
    - location: scripts/application_start.sh
      timeout: 180
      runas: root
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 60
      runas: root
